name: Update Homebrew Tap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to bump (e.g. 1.3.0)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  bump:
    name: Bump Homebrew tap
    runs-on: ubuntu-latest
    permissions:
      contents: read

jobs:
  bump:
    name: Bump Homebrew tap
    runs-on: ubuntu-latest
    steps:
      - name: Trigger homebrew-tap bump
        run: |
          if [ -n "${{ github.inputs.version }}" ]; then
            VERSION="${{ github.inputs.version }}"
          else
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#@mihairo/cmt-v}"
          fi
          sleep 30  # give npm time to fully process the package
          echo "Bumping to version: $VERSION"
          RESPONSE=$(curl -fsSL -X POST \
            -H "Authorization: token ${{ secrets.HOMEBREW_TAP_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -w "%{http_code}" \
            -o /dev/null \
            https://api.github.com/repos/mihai-ro/homebrew-tap/dispatches \
            -d "{\"event_type\":\"bump-cmt\",\"client_payload\":{\"version\":\"${VERSION}\"}}")
          echo "HTTP Response: $RESPONSE"
          if [ "$RESPONSE" != "204" ]; then
            curl -v -X POST \
              -H "Authorization: token ${{ secrets.HOMEBREW_TAP_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/mihai-ro/homebrew-tap/dispatches \
              -d "{\"event_type\":\"bump-cmt\",\"client_payload\":{\"version\":\"${VERSION}\"}}"
          fi
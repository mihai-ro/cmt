name: Release
on:
  push:
    tags: ["@mihairo/cmt-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish (e.g. @mihairo/cmt-v2.0.0)"
        required: true
permissions:
  contents: write
env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  ext: "" }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, ext: "" }
          - { os: macos-latest,   target: x86_64-apple-darwin,       ext: "" }
          - { os: macos-latest,   target: aarch64-apple-darwin,      ext: "" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    ext: ".exe" }
          - { os: windows-latest, target: aarch64-pc-windows-msvc,   ext: ".exe" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross linker (linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/cmt${{ matrix.ext }}" "dist/cmt-${{ matrix.target }}${{ matrix.ext }}"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/cmt-${{ matrix.target }}${{ matrix.ext }}

  checksum:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ env.RELEASE_TAG }}" \
            --repo "${{ github.repository }}" \
            --dir dist
      - name: Generate checksums.json
        run: |
          python3 -c "
          import hashlib, json, os
          out = {}
          for f in sorted(os.listdir('dist')):
              with open(os.path.join('dist', f), 'rb') as fh:
                  out[f] = hashlib.sha256(fh.read()).hexdigest()
          with open('dist/checksums.json', 'w') as f:
              json.dump(out, f, indent=2)
          "
      - name: Upload checksums.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ env.RELEASE_TAG }}" \
            --repo "${{ github.repository }}" \
            dist/checksums.json

  update-homebrew-formula:
    needs: checksum
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          VERSION="${TAG##*-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download checksums.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ env.RELEASE_TAG }}" \
            --repo "${{ github.repository }}" \
            --pattern "checksums.json" \
            --output checksums.json

      - name: Update formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 << 'PYEOF'
          import json, os

          version = os.environ["VERSION"]
          base_url = f"https://github.com/mihai-ro/cmt/releases/download/%40mihairo/cmt-v{version}"

          with open("checksums.json") as f:
              checksums = json.load(f)

          formula = (
              'class Cmt < Formula\n'
              '  desc "Conventional Commits CLI — a single native binary"\n'
              '  homepage "https://github.com/mihai-ro/cmt"\n'
              f'  version "{version}"\n'
              '  license "MIT"\n'
              '\n'
              '  on_macos do\n'
              '    on_arm do\n'
              f'      url "{base_url}/cmt-aarch64-apple-darwin"\n'
              f'      sha256 "{checksums["cmt-aarch64-apple-darwin"]}"\n'
              '    end\n'
              '    on_intel do\n'
              f'      url "{base_url}/cmt-x86_64-apple-darwin"\n'
              f'      sha256 "{checksums["cmt-x86_64-apple-darwin"]}"\n'
              '    end\n'
              '  end\n'
              '\n'
              '  on_linux do\n'
              '    on_arm do\n'
              f'      url "{base_url}/cmt-aarch64-unknown-linux-gnu"\n'
              f'      sha256 "{checksums["cmt-aarch64-unknown-linux-gnu"]}"\n'
              '    end\n'
              '    on_intel do\n'
              f'      url "{base_url}/cmt-x86_64-unknown-linux-gnu"\n'
              f'      sha256 "{checksums["cmt-x86_64-unknown-linux-gnu"]}"\n'
              '    end\n'
              '  end\n'
              '\n'
              '  def install\n'
              '    bin.install Dir["cmt-*"].first => "cmt"\n'
              '  end\n'
              '\n'
              '  test do\n'
              '    assert_match "cmt version #{version}", shell_output("#{bin}/cmt --version")\n'
              '    assert_match "feat", shell_output("#{bin}/cmt types")\n'
              '    pipe_output("#{bin}/cmt lint", "feat: add login\\n", 0)\n'
              '    pipe_output("#{bin}/cmt lint", "bad message\\n", 1)\n'
              '  end\n'
              'end\n'
          )

          with open("HomebrewFormula/cmt.rb", "w") as f:
              f.write(formula)
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HomebrewFormula/cmt.rb
          git commit -m "chore: update Homebrew formula to v${{ steps.version.outputs.version }}"
          git push

  publish-npm:
    needs: checksum
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@mihairo/cmt
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Download checksums.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ env.RELEASE_TAG }}" \
            --repo "${{ github.repository }}" \
            --pattern "checksums.json" \
            --dir npm/
      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

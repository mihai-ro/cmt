name: Update Homebrew formula

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. @mihairo/cmt-v2.0.3)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    if: |
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, '@mihairo/cmt-v')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Resolve tag and version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi
          VERSION="${TAG##*-v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download checksums.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.meta.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "checksums.json" \
            --output checksums.json

      - name: Update formula
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          python3 << 'PYEOF'
          import json, os

          version = os.environ["VERSION"]
          base_url = f"https://github.com/mihai-ro/cmt/releases/download/%40mihairo/cmt-v{version}"

          with open("checksums.json") as f:
              checksums = json.load(f)

          formula = (
              'class Cmt < Formula\n'
              '  desc "Conventional Commits CLI — a single native binary"\n'
              '  homepage "https://github.com/mihai-ro/cmt"\n'
              f'  version "{version}"\n'
              '  license "MIT"\n'
              '\n'
              '  on_macos do\n'
              '    on_arm do\n'
              f'      url "{base_url}/cmt-aarch64-apple-darwin"\n'
              f'      sha256 "{checksums["cmt-aarch64-apple-darwin"]}"\n'
              '    end\n'
              '    on_intel do\n'
              f'      url "{base_url}/cmt-x86_64-apple-darwin"\n'
              f'      sha256 "{checksums["cmt-x86_64-apple-darwin"]}"\n'
              '    end\n'
              '  end\n'
              '\n'
              '  on_linux do\n'
              '    on_arm do\n'
              f'      url "{base_url}/cmt-aarch64-unknown-linux-gnu"\n'
              f'      sha256 "{checksums["cmt-aarch64-unknown-linux-gnu"]}"\n'
              '    end\n'
              '    on_intel do\n'
              f'      url "{base_url}/cmt-x86_64-unknown-linux-gnu"\n'
              f'      sha256 "{checksums["cmt-x86_64-unknown-linux-gnu"]}"\n'
              '    end\n'
              '  end\n'
              '\n'
              '  def install\n'
              '    bin.install Dir["cmt-*"].first => "cmt"\n'
              '  end\n'
              '\n'
              '  test do\n'
              '    assert_match "cmt version #{version}", shell_output("#{bin}/cmt --version")\n'
              '    assert_match "feat", shell_output("#{bin}/cmt types")\n'
              '    pipe_output("#{bin}/cmt lint", "feat: add login\\n", 0)\n'
              '    pipe_output("#{bin}/cmt lint", "bad message\\n", 1)\n'
              '  end\n'
              'end\n'
          )

          with open("HomebrewFormula/cmt.rb", "w") as f:
              f.write(formula)
          PYEOF

      - name: Open PR with automerge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          BRANCH="chore/homebrew-formula-v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add HomebrewFormula/cmt.rb
          git commit -m "chore: update Homebrew formula to v${VERSION}"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore: update Homebrew formula to v${VERSION}" \
            --body "Automated formula update after release v${VERSION}." \
            --base main \
            --head "$BRANCH")
          gh pr merge "$PR_URL" --auto --squash
